<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麵屋武藏業績儀表板</title>
<style>
/* ====== 完全沿用您的原始樣式，絕不改動 ====== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px;}
.wrap{max-width:860px;margin:0 auto;padding:1.25rem 1rem;}
h1{font-size:17px;font-weight:500;margin-bottom:1.25rem;color:#1a1a1a;}
.tabs{display:flex;gap:0;border-bottom:1px solid #e0dfd7;margin-bottom:1.25rem;overflow-x:auto;}
.tab{font-size:13px;padding:8px 14px;cursor:pointer;color:#666;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all .15s;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500;}
.view{display:none;}.view.show{display:block;}
.paste-area{width:100%;min-height:160px;padding:10px;font-size:12px;font-family:monospace;border:0.5px solid #ccc;border-radius:8px;color:#1a1a1a;background:#f0efe8;resize:vertical;}
.btn{width:100%;padding:10px;border:0.5px solid #ccc;border-radius:8px;background:transparent;font-size:13px;font-weight:500;color:#1a1a1a;cursor:pointer;margin-top:8px;}
.btn:hover{background:#e8e7e1;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{font-size:12px;padding:6px 10px;border-radius:8px;margin-top:8px;display:none;}
.msg.ok{background:#d4edda;color:#155724;}
.msg.err{background:#f8d7da;color:#721c24;}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.mc{background:#f0efe8;border-radius:8px;padding:10px 12px;}
.mc .lbl{font-size:11px;color:#666;margin-bottom:3px;}
.mc .val{font-size:18px;font-weight:500;color:#1a1a1a;}
.mc .sub{font-size:10px;color:#888;margin-top:2px;}
.sgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.scard{background:#fff;border:0.5px solid #e0dfd7;border-radius:12px;padding:12px;cursor:pointer;transition:box-shadow .15s;}
.scard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.scard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.sname{font-size:13px;font-weight:500;}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;}
.bg{background:#d4edda;color:#155724;}
.ba{background:#fff3cd;color:#856404;}
.br{background:#f8d7da;color:#721c24;}
.bx{background:#f0efe8;color:#666;}
.srev{font-size:17px;font-weight:500;margin-bottom:6px;}
.bar-wrap{height:5px;background:#f0efe8;border-radius:3px;margin-bottom:6px;overflow:hidden;}
.bar{height:100%;border-radius:3px;}
.srow{display:flex;justify-content:space-between;font-size:11px;color:#888;}
.srow span:last-child{color:#1a1a1a;}
.no-data{font-size:12px;color:#888;text-align:center;padding:16px 0;}
.dtable{width:100%;border-collapse:collapse;font-size:12px;}
.dtable th{text-align:left;padding:6px 8px;color:#888;font-weight:400;border-bottom:0.5px solid #e0dfd7;}
.dtable td{padding:6px 8px;color:#1a1a1a;border-bottom:0.5px solid #e0dfd7;}
.dtable tr:last-child td{border-bottom:none;}
.bgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.bcard{background:#fff;border:0.5px solid #e0dfd7;border-radius:12px;padding:12px;}
.bcard .t{font-size:11px;color:#888;margin-bottom:4px;}
.bcard .v{font-size:16px;font-weight:500;}
.bcard .s{font-size:11px;color:#888;margin-top:2px;}
.ssel-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.ssel{font-size:12px;padding:4px 10px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;color:#666;background:transparent;}
.ssel.active{background:#e8f0fe;color:#1a56db;border-color:transparent;}
.sec{font-size:12px;font-weight:500;color:#666;margin:12px 0 8px;}
.trow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.date-btn{font-size:11px;padding:3px 8px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;background:transparent;color:#666;}
.date-btn.active{background:#e8f0fe;color:#1a56db;border-color:transparent;}
.pcard{background:#fff;border:0.5px solid #e0dfd7;border-radius:12px;padding:14px;}
.pcard.urgent{border-color:#c0392b;}
.pcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.pcard-name{font-size:14px;font-weight:500;color:#1a1a1a;}
.pct-badge{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500;}
.pct-ok{background:#d4edda;color:#155724;}
.pct-warn{background:#fff3cd;color:#856404;}
.pct-danger{background:#f8d7da;color:#721c24;}
.pbar-wrap{height:5px;background:#f0efe8;border-radius:3px;margin-bottom:10px;overflow:hidden;}
.pbar{height:100%;border-radius:3px;}
.pstat-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.pstat{font-size:11px;color:#888;}
.pstat span{color:#1a1a1a;font-weight:500;}
.pdivider{height:0.5px;background:#e0dfd7;margin:10px 0;}
.plabel{font-size:11px;font-weight:500;color:#888;margin-bottom:6px;letter-spacing:.04em;}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.ptag{font-size:11px;padding:3px 9px;border-radius:8px;border:0.5px solid transparent;}
.pt-blue{background:#e8f0fe;color:#174ea6;border-color:#b3caf5;}
.pt-amber{background:#fff3cd;color:#7a4f00;border-color:#f5c842;}
.pt-green{background:#d4edda;color:#155724;border-color:#a3d9b1;}
.pt-purple{background:#f0e6fe;color:#4a1480;border-color:#c084fc;}
.pt-coral{background:#fde8e4;color:#7f1d1d;border-color:#fca5a5;}
.pt-teal{background:#d0f4e8;color:#065f46;border-color:#6ee7b7;}
.preason{font-size:11px;color:#666;line-height:1.5;}
.pgap{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:3px;}
.pontrack{font-size:12px;color:#3a9d65;}

/* ====== 隱藏在底層的新增功能樣式（不干擾原版面） ====== */
#sync-status { font-size: 11px; color: #666; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: opacity 0.2s; padding: 4px; border-radius: 4px; }
#sync-status:hover { opacity: 0.7; background: #e0dfd7; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.online { background-color: #3a9d65; }
.dot.syncing { background-color: #e67e22; animation: blink 1s infinite; }
.dot.offline { background-color: #c0392b; }
@keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
.modal-content { background:#fff; width:90%; max-width:350px; padding:20px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
.modal-content input[type="number"] { width:100%; padding:8px; border:0.5px solid #ccc; border-radius:8px; font-size:14px; margin-bottom:12px; }

/* 活動小標籤 */
.event-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
.tag-promo { background: #fde8e4; color: #c0392b; }
.tag-limited { background: #e8f0fe; color: #1a56db; }

@media(max-width:520px){
  .metrics{grid-template-columns:repeat(2,minmax(0,1fr));}
  .sgrid{grid-template-columns:1fr;}
  .bgrid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:1.25rem;">
    <h1 style="margin-bottom:0;">麵屋武藏業績儀表板</h1>
    <div id="sync-status" onclick="loadFromSheets()" title="點擊重新從 Google Sheets 載入資料"><span class="dot offline" id="status-dot"></span> <span id="status-text">連線中...</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="sw('overview')">總覽</button>
    <button class="tab" onclick="sw('detail')">各店明細</button>
    <button class="tab" onclick="sw('input')">貼上報表</button>
    <button class="tab" onclick="sw('settings')">目標設定</button>
    <button class="tab" onclick="sw('promo')">促銷建議</button>
  </div>
 
  <div class="view show" id="view-overview">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px;">
      <span style="font-size:13px;font-weight:500;" id="ov-title">載入數據中...</span>
      <div id="date-btns" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
    </div>
    <div class="metrics" id="ov-metrics"></div>
    <div class="sec">各店今日業績</div>
    <div class="sgrid" id="ov-stores"><div class="no-data" style="grid-column:1/-1;">正在與雲端同步...</div></div>
  </div>
 
  <div class="view" id="view-detail">
    <div class="ssel-row" id="dsel"></div>
    <div id="dcontent"><div class="no-data">請先貼入數據</div></div>
  </div>
 
  <div class="view" id="view-input">
    <div style="font-size:12px;color:#666;margin-bottom:8px;">將 LINE 群組業績報表完整複製貼入</div>
    <textarea class="paste-area" id="paste-box" placeholder="直接貼上 LINE 群組完整訊息..."></textarea>
    <button class="btn" onclick="doParseAndSave()">1. 解析並儲存至本機</button>
    <button class="btn" id="sheets-btn" onclick="syncToSheets()" style="background:#e8f0fe;color:#1a56db;border-color:#b3caf5;margin-top:6px;">2. 推送更新至 Google 試算表 →</button>
    <div class="msg" id="parse-msg"></div>
    <div class="msg" id="sheets-msg"></div>
    <div style="margin-top:10px;font-size:12px;color:#666;">已暫存 <span id="rec-count">0</span> 筆｜<button style="font-size:11px;color:#c0392b;background:none;border:none;cursor:pointer;text-decoration:underline;" onclick="clearAll()">清除全部</button></div>
  </div>
 
  <div class="view" id="view-settings">
    <div class="sec">各店月目標業績設定</div>
    <div id="tgt-inputs"></div>
    <button class="btn" style="margin-top:10px;" onclick="saveTargets()">儲存目標 →</button>
    <div class="msg" id="tgt-msg"></div>
  </div>
 
  <div class="view" id="view-promo">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <span style="font-size:13px;font-weight:500;color:#1a1a1a;">促銷建議分析</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:12px;color:#666;">本月剩餘天數</span>
        <input type="number" id="promo-days" min="1" max="31" style="width:60px;font-size:12px;padding:4px 8px;border:0.5px solid #ccc;border-radius:6px;" oninput="renderPromo()">
      </div>
    </div>
    <div id="promo-grid" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;">
      <div class="no-data" style="grid-column:1/-1;">請先在「貼上報表」頁籤貼入 LINE 報表</div>
    </div>
  </div>
</div>

<!-- 修改紀錄彈窗 (Modal) -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal-content">
        <div style="font-size:15px; font-weight:500; margin-bottom:15px; border-bottom:0.5px solid #eee; padding-bottom:10px;" id="m-title">修改紀錄</div>
        <div style="font-size:11px; color:#666; margin-bottom:2px;">當日業績</div>
        <input type="number" id="m-dailyRev">
        <div style="font-size:11px; color:#666; margin-bottom:2px;">當月累計業績</div>
        <input type="number" id="m-monthRev">
        <div style="font-size:11px; color:#666; margin-bottom:2px;">今日筆數</div>
        <input type="number" id="m-totalOrders">
        <div style="font-size:11px; color:#666; margin-bottom:2px;">內用均單價</div>
        <input type="number" id="m-dineInAvg">
        
        <div style="display:flex; gap:15px; margin: 10px 0;">
            <label style="font-size:13px; cursor:pointer;"><input type="checkbox" id="m-hasPromo"> 🧧 促銷活動</label>
            <label style="font-size:13px; cursor:pointer;"><input type="checkbox" id="m-hasLimited"> 🍜 限定麵</label>
        </div>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn" onclick="closeModal()" style="flex:1; margin-top:0;">取消</button>
            <button class="btn" id="m-save-btn" style="flex:2; margin-top:0; background:#e8f0fe; color:#1a56db; border-color:#b3caf5;">儲存並同步</button>
        </div>
    </div>
</div>

<script>
// --- 全域變數 ---
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwV6Gq_x_F3uAxUJAcWD9I-JIh6otK8kQ8R-PwoN2qedk22MlInZ6XfUpuqLPl0TNLG9A/exec";
const STORES=['神山','本店','光復','信義','台中','武骨'];
const DEF_TGTS={神山:2100000,本店:2070000,光復:1730000,信義:2300000,台中:1800000,武骨:1940000};
let db={}, tgts=Object.assign({},DEF_TGTS);
let curDate = ''; 
let detStore = STORES[0];

// 初始化與防呆自動清理
try {
  const s = localStorage.getItem('musashi_db'); 
  if(s) {
    db = JSON.parse(s);
    // 自動清理掉先前可能當機的 null 資料
    Object.keys(db).forEach(k => {
        if(!db[k] || !db[k].date || db[k].date === 'null') delete db[k];
    });
  }
  const t = localStorage.getItem('musashi_tgts'); 
  if(t) tgts = JSON.parse(t);
} catch(e) {}

function saveDB(){ try{localStorage.setItem('musashi_db',JSON.stringify(db));}catch(e){} }
function saveTgtsLS(){ try{localStorage.setItem('musashi_tgts',JSON.stringify(tgts));}catch(e){} }

// 正規化替換全形與無用字元，為解析做準備
function norm(t){
  return t.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/：/g,':').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[\u200B\u200C\u200D\uFEFF]/g,'').replace(/Uber\s*Ea[ts:]*\b/gi,'UberEats').replace(/Uber\s*Eats/gi,'UberEats').replace(/Uber\s*Eat\b/gi,'UberEats').replace(/《Foodpanda》/g,'Foodpanda').replace(/《UBER》/gi,'UberEats');
}

// 解析日期 (自動消除所有空白，處理「4月 6日」)
function parseDate(raw){
  raw = (raw||'').replace(/\s+/g, '').replace(/：/g,':'); 
  let m = raw.match(/(\d{1,2})[月\/](\d{1,2})/);
  if(m){
    const mo=parseInt(m[1]),da=parseInt(m[2]);
    const now=new Date();
    const yr=(mo>now.getMonth()+1&&now.getMonth()+1<=3)?now.getFullYear()-1:now.getFullYear();
    return yr+'/'+String(mo).padStart(2,'0')+'/'+String(da).padStart(2,'0');
  }
  return null;
}

function parseStore(raw){
  return (raw||'').replace(/[\s\u3000]*[\(（【].*/,'').trim();
}

function getNum(text,pats){
  for(const p of pats){
    const m=text.match(p);
    if(m){const v=parseInt(String(m[1]).replace(/[,\s]/g,''));if(!isNaN(v))return v;}
  }
  return 0;
}

// ✨ 終極切割邏輯：完全不看時間戳記，只認「日期：」這兩個字作為新報表的開頭
function splitBlocks(text){
  const normalizedText = norm(text);
  const lines = normalizedText.split('\n');
  const blocks = [];
  let cur = [];
  for(const ln of lines){
    const t = ln.trim();
    // 只要看到這行開頭是 "日期:"，就立刻把前面的內容切斷包裝成一塊
    if(/^日期\s*:/.test(t)){
      if(cur.length > 0){
        blocks.push(cur.join('\n'));
        cur = [];
      }
    }
    cur.push(ln);
  }
  if(cur.length > 0) blocks.push(cur.join('\n'));
  
  // 過濾出真正有店名跟業績的有效區塊
  return blocks.filter(b => /店名\s*:/.test(b) && /當日業績\s*:/.test(b));
}

function parseBlock(text){
  const dRaw=(text.match(/日期\s*:\s*([^\n]+)/)||[])[1];
  const sRaw=(text.match(/店名\s*:\s*([^\n]+)/)||[])[1];
  if(!dRaw||!sRaw) return null;
  
  const date=parseDate(dRaw);
  if(!date) return null;

  const store=parseStore(sRaw);
  if(!store) return null;

  const hasPromo = text.includes('《門市優惠活動》') || text.includes('滿500折100');
  const hasLimited = text.includes('《期間限定麵》');
  
  const uIdx=text.indexOf('UberEats');
  const pIdx=text.indexOf('Foodpanda');
  const uBlock=uIdx>=0?text.slice(uIdx,pIdx>uIdx?pIdx:uIdx+300):'';
  const pBlock=pIdx>=0?text.slice(pIdx,pIdx+250):'';
  
  return {
    date,store, hasPromo, hasLimited,
    totalOrders:getNum(text,[/當日筆數\s*:\s*(\d+)/]),
    dailyRev:getNum(text,[/當日業績\s*:\s*(\d+)/]),
    monthRev:getNum(text,[/當月累計業績\s*:\s*(\d+)/]),
    dineInOrders:getNum(text,[/內用筆數\s*:\s*(\d+)/]),
    dineInPeople:getNum(text,[/內用人數\s*:\s*(\d+)/]),
    dineInAvg:getNum(text,[/當日均單\(人\)\s*:\s*(\d+)/]),
    dineInRev:getNum(text,[/《內用》[\s\S]*?當日金額\s*:\s*(\d+)/]),
    takeoutRev:getNum(text,[/現場[^》\n]*》?[\s\S]*?當日金額\s*:\s*(\d+)/]),
    takeoutMonth:getNum(text,[/現場[^》\n]*》?[\s\S]*?當月累計金額\s*:\s*(\d+)/]),
    onlineRev:getNum(text,[/線上點餐[^》\n]*》?[\s\S]*?當日金額\s*:\s*(\d+)/]),
    onlineMonth:getNum(text,[/線上點餐[^》\n]*》?[\s\S]*?當月累計金額\s*:\s*(\d+)/]),
    uberOrders:getNum(uBlock,[/外送筆數\s*:\s*(\d+)/,/當日筆數\s*:\s*(\d+)/]),
    uberRev:getNum(uBlock,[/當日金額\s*:\s*(\d+)/]),
    uberMonth:getNum(uBlock,[/累[計積]金額\s*:\s*(\d+)/]),
    pandaOrders:getNum(pBlock,[/外送筆數\s*:\s*(\d+)/,/當日筆數\s*:\s*(\d+)/]),
    pandaRev:getNum(pBlock,[/當日金額\s*:\s*(\d+)/]),
    pandaMonth:getNum(pBlock,[/累[計積]金額\s*:\s*(\d+)/]),
  };
}

function doParseAndSave(){
  const text=document.getElementById('paste-box').value.trim();
  if(!text){showMsg('parse-msg','請先貼入報表文字','err');return;}
  
  const blocks=splitBlocks(text);
  if(!blocks.length){showMsg('parse-msg','解析失敗：找不到有效報表資料','err');return;}
  
  let validCount = 0;
  blocks.forEach(b=>{
    const r=parseBlock(b); 
    if(r && r.date) {
        db[r.date+'_'+r.store]=r;
        validCount++;
    }
  });
  
  // 清理 3 個月前的舊資料
  const now=new Date();
  const cut=new Date(now.getFullYear(),now.getMonth()-3,now.getDate());
  const cutStr=cut.getFullYear()+'/'+String(cut.getMonth()+1).padStart(2,'0')+'/'+String(cut.getDate()).padStart(2,'0');
  Object.keys(db).forEach(k=>{if(db[k].date<cutStr)delete db[k];});

  saveDB();
  document.getElementById('rec-count').textContent=Object.keys(db).length;
  document.getElementById('paste-box').value='';
  showMsg('parse-msg','成功解析 '+validCount+' 筆資料！請記得點擊「推送」存入雲端。','ok');
  renderOv();renderDSel();renderPromo();
}

function clearAll(){
  if(!confirm('確定清除所有手機暫存？(不影響 Google 雲端)'))return;
  db={};saveDB();
  document.getElementById('rec-count').textContent=0;
  renderOv();renderDSel();
}

function showMsg(id,t,type){
  const el=document.getElementById(id);
  el.textContent=t;el.className='msg '+type;el.style.display='block';
  setTimeout(()=>{el.style.display='none';},5000);
}

function setSyncStatus(s,t){ 
  const d=document.getElementById('status-dot'); 
  const txt=document.getElementById('status-text');
  if(d) d.className='dot '+s; 
  if(txt) txt.textContent=t; 
}

async function syncToSheets(){
  const btn=document.getElementById('sheets-btn'); btn.disabled=true;
  setSyncStatus('syncing', '正在同步至雲端...');
  try {
    const resp = await fetch(GAS_API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'sync_data', records: Object.values(db) }) });
    const res = await resp.json();
    if(res.status==='success'){ showMsg('sheets-msg','雲端同步成功！','ok'); setSyncStatus('online','已與雲端同步'); }
  } catch(e) { showMsg('sheets-msg','同步失敗','err'); setSyncStatus('offline','同步失敗'); }
  finally { btn.disabled=false; }
}

async function loadFromSheets() {
  setSyncStatus('syncing', '載入雲端數據中...');
  try {
    const resp = await fetch(GAS_API_URL+'?action=get_latest');
    const data = await resp.json();
    if(data.status==='success' && data.records){
      data.records.forEach(r => { 
        let cleanDate = r.date;
        if(typeof cleanDate === 'string' && cleanDate.includes('T')) {
            const d = new Date(cleanDate);
            cleanDate = d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
        } else if(typeof cleanDate === 'string') {
            cleanDate = cleanDate.replace(/-/g,'/');
        }
        r.date = cleanDate;
        
        // 防呆：強迫將數字轉正，防止 NaN 導致畫面白掉
        const numFields = ['dailyRev', 'monthRev', 'totalOrders', 'dineInAvg', 'dineInRev', 'dineInOrders', 'dineInPeople', 'uberRev', 'pandaRev', 'uberMonth', 'pandaMonth', 'takeoutRev', 'onlineRev', 'takeoutMonth', 'onlineMonth', 'uberOrders', 'pandaOrders'];
        numFields.forEach(f => { r[f] = parseInt(r[f]) || 0; });
        
        r.hasPromo = !!r.hasPromo;
        r.hasLimited = !!r.hasLimited;

        if(r.date) db[cleanDate+'_'+r.store]=r; 
      });
      saveDB(); setSyncStatus('online','雲端數據已同步 (點擊可更新)'); renderOv(); renderDSel(); renderPromo();
    }
  } catch(e) { setSyncStatus('offline','目前僅顯示手機資料'); renderOv(); }
}

function allDates(){ return [...new Set(Object.values(db).map(r=>r.date).filter(Boolean))].sort().reverse(); }

    document.getElementById('ov-stores').innerHTML='<div class="no-data" style="grid-column:1/-1;">請先在「貼上報表」貼入 LINE 報表</div>';
    btnEl.innerHTML='';return;
  }
  
  if(!curDate||!dates.includes(curDate))curDate=dates[0];
  
  btnEl.innerHTML=dates.slice(0,7).map(d=> {
      if(!d) return ''; 
      return '<button class="date-btn'+(d===curDate?' active':'')+'" onclick="setDate(\''+d+'\')">'+d.slice(5)+'</button>';
  }).join('');
  
  const rows=Object.values(db).filter(r=>r.date===curDate);
  const tRev=rows.reduce((s,r)=>s+r.dailyRev,0);
  const tMon=rows.reduce((s,r)=>s+r.monthRev,0);
  const tOrd=rows.reduce((s,r)=>s+r.totalOrders,0);
  const unrep=STORES.filter(s=>!rows.find(r=>r.store===s));
  
  document.getElementById('ov-metrics').innerHTML=
    '<div class="mc"><div class="lbl">今日總業績</div><div class="val">$'+tRev.toLocaleString()+'</div><div class="sub">'+rows.length+'店回報</div></div>'+
    '<div class="mc"><div class="lbl">當月累計（加總）</div><div class="val">'+(tMon/10000).toFixed(1)+'萬</div></div>'+
    '<div class="mc"><div class="lbl">今日總筆數</div><div class="val">'+tOrd+'</div><div class="sub">全通路</div></div>'+
    '<div class="mc"><div class="lbl">已回報</div><div class="val">'+rows.length+'/'+STORES.length+'</div><div class="sub">'+(unrep.length?'未：'+unrep.join('、'):'全數到齊 ✓')+'</div></div>';

  const now = new Date();
  const timeProgressPct = Math.round((now.getDate() / new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate()) * 100);

  document.getElementById('ov-stores').innerHTML=STORES.map(s=>{
    const r=rows.find(x=>x.store===s);
    if(!r)return '<div class="scard" onclick="goDetail(\''+s+'\')"><div class="scard-top"><span class="sname">'+s+'</span><span class="badge bx">未回報</span></div><div class="no-data" style="font-size:11px;padding:8px 0;">尚未收到今日報表</div></div>';
    const tgt=tgts[s]||2000000;
    const pct=Math.min(Math.round(r.monthRev/tgt*100),100);
    
    let cls = (pct >= 100) ? 'bg' : (pct >= (timeProgressPct - 5)) ? 'ba' : 'br';
    let bc = (cls === 'bg') ? '#3a9d65' : (cls === 'ba') ? '#e67e22' : '#c0392b';
    
    const pTag = r.hasPromo ? '<span class="event-tag tag-promo">促</span>' : '';
    const lTag = r.hasLimited ? '<span class="event-tag tag-limited">限</span>' : '';

    const dP=r.dailyRev?Math.round((r.dineInRev||0)/r.dailyRev*100):0;
    const uP=r.dailyRev?Math.round((r.uberRev||0)/r.dailyRev*100):0;
    const pP=r.dailyRev?Math.round((r.pandaRev||0)/r.dailyRev*100):0;
    
    return '<div class="scard" onclick="goDetail(\''+s+'\')">'
      +'<div class="scard-top"><span class="sname">'+s+pTag+lTag+'</span><span class="badge '+cls+'">進度 '+pct+'%</span></div>'
      +'<div class="srev">$'+r.dailyRev.toLocaleString()+'</div>'
      +'<div class="bar-wrap"><div class="bar" style="width:'+pct+'%;background:'+bc+';"></div></div>'
      +'<div class="srow"><span>當月累計</span><span>$'+r.monthRev.toLocaleString()+'</span></div>'
      +'<div class="srow"><span>今日筆數</span><span>'+r.totalOrders+'筆</span></div>'
      +'<div class="srow"><span>內用/Uber/Panda</span><span>'+dP+'%/'+uP+'%/'+pP+'%</span></div>'
      +'</div>';
  }).join('');
}

function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

async function saveEditedRecord(key) {
    const r = db[key];
    const btn = document.getElementById('m-save-btn');
    btn.disabled = true; btn.textContent = '同步中...';
    r.dailyRev = parseInt(document.getElementById('m-dailyRev').value) || 0;
    r.monthRev = parseInt(document.getElementById('m-monthRev').value) || 0;
    r.totalOrders = parseInt(document.getElementById('m-totalOrders').value) || 0;
    r.dineInAvg = parseInt(document.getElementById('m-dineInAvg').value) || 0;
    r.hasPromo = document.getElementById('m-hasPromo').checked;
    r.hasLimited = document.getElementById('m-hasLimited').checked;
    saveDB();
    
    try {
        const resp = await fetch(GAS_API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'update_single', record: r }) });
        const res = await resp.json();
        if(res.status === 'success') {
            closeModal(); renderOv(); renderD();
            showMsg('sheets-msg', '雲端同步修改成功！', 'ok');
        }
    } catch(e) { alert('本機已儲存，但雲端同步失敗。'); }
    finally { btn.disabled = false; btn.textContent = '儲存並同步'; }
}

// ===== 促銷建議頁 =====
function renderPromo(){
  const daysLeft=parseInt(document.getElementById('promo-days').value)||0;
  const grid=document.getElementById('promo-grid');
  const latestByStore={};
  Object.values(db).forEach(r=>{
    if(!latestByStore[r.store]||r.date>latestByStore[r.store].date) latestByStore[r.store]=r;
  });
  const storeData=STORES.map(s=>latestByStore[s]).filter(Boolean);
  if(!storeData.length){
    grid.innerHTML='<div class="no-data" style="grid-column:1/-1;">請先在「貼上報表」頁籤貼入 LINE 報表</div>';
    return;
  }
  
  const now = new Date();
  const timeProgressPct = Math.round((now.getDate() / new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate()) * 100);
  
  grid.innerHTML=STORES.map(s=>{
    const r=latestByStore[s];
    if(!r) return '<div class="pcard"><div class="pcard-top"><span class="pcard-name">'+s+'</span><span class="pct-badge" style="background:#f0efe8;color:#666;">未回報</span></div><div style="font-size:11px;color:#888;">尚無數據</div></div>';
    const tgt=tgts[s]||2000000;
    const pct=Math.round(r.monthRev/tgt*100);
    const gap=Math.max(tgt-r.monthRev,0);
    const dailyNeed=daysLeft>0?Math.round(gap/daysLeft):0;
    const dates=Object.values(db).filter(x=>x.store===s).sort((a,b)=>b.date.localeCompare(a.date));
    const avgDaily=dates.length>1?(dates[0].monthRev-dates[dates.length-1].monthRev+dates[dates.length-1].dailyRev)/dates.length:r.dailyRev;
    
    let badgeCls = (pct >= 100) ? 'pct-ok' : (pct >= (timeProgressPct - 5)) ? 'pct-warn' : 'pct-danger';
    let barColor = (badgeCls === 'pct-ok') ? '#3a9d65' : (badgeCls === 'pct-warn') ? '#e67e22' : '#c0392b';
    
    const isUrgent = pct < (timeProgressPct - 5);
    const promos=getPromoSuggestions(pct,gap,daysLeft,Math.round(avgDaily));
    const pctCapped=Math.min(pct,100);
    
    return '<div class="pcard'+(isUrgent?' urgent':'')+'">'+
      '<div class="pcard-top"><span class="pcard-name">'+s+'</span><span class="pct-badge '+badgeCls+'">進度 '+pct+'%</span></div>'+
      '<div class="pbar-wrap"><div class="pbar" style="width:'+pctCapped+'%;background:'+barColor+';"></div></div>'+
      '<div class="pstat-row">'+
        '<div class="pstat">累計 <span>$'+r.monthRev.toLocaleString()+'</span></div>'+
        '<div class="pstat">目標 <span>$'+tgt.toLocaleString()+'</span></div>'+
        '<div class="pstat">剩 <span>'+daysLeft+'天</span></div>'+
      '</div>'+
      '<div class="pdivider"></div>'+
      (pct>=100?
        '<div class="pontrack">已達標！繼續維持現有策略</div>'
      :
        '<div class="pgap">還差 $'+gap.toLocaleString()+' ／ 每日需達 $'+dailyNeed.toLocaleString()+'</div>'+
        '<div style="font-size:11px;color:#888;margin-bottom:10px;">目前日均 $'+Math.round(avgDaily).toLocaleString()+'，需提升 '+Math.max(0,Math.round((dailyNeed/Math.max(avgDaily,1)-1)*100))+'%</div>'+
        '<div class="plabel">建議促銷方案</div>'+
        '<div class="ptags">'+promos.map(p=>'<span class="ptag '+p.style+'" title="'+p.reason+'">'+p.tag+'</span>').join('')+'</div>'+
        '<div class="preason">'+promos[0].reason+'</div>'
      )+
    '</div>';
  }).join('');
}

function getPromoSuggestions(pct,gap,daysLeft,avgDaily){
  if(pct>=100 || gap <= 0) return [];
  const dailyNeed = daysLeft > 0 ? gap / daysLeft : gap;
  const boostRatio = avgDaily > 0 ? dailyNeed / avgDaily : 2; 
  const isEmergency = daysLeft <= 7;
  const suggestions = [];

  if (boostRatio <= 1.1) {
    suggestions.push({tag:'推廣加價購', style:'pt-blue', reason:'每日業績缺口小於10%，加強門市人員推廣高毛利小菜、飲料或配料。'});
    suggestions.push({tag:'優化點餐引導', style:'pt-teal', reason:'不需打折，透過話術引導客人升級大碗或加點套餐，保護毛利。'});
  } else if (boostRatio <= 1.3) {
    suggestions.push({tag:'限定品項特價', style:'pt-amber', reason:'業績需提升10~30%，可針對單一主力或高毛利品項做快閃特價。'});
    suggestions.push({tag:'外送滿額贈', style:'pt-purple', reason:'透過外送平台小幅讓利（如滿300送小菜）快速拉高單筆消費。'});
  } else {
    suggestions.push({tag:'外送強力折扣', style:'pt-coral', reason:'業績需大幅提升，建議啟動 Uber/Panda 滿減活動快速衝單。'});
    suggestions.push({tag:'指定主餐買一送一', style:'pt-coral', reason:'需要強效誘因大幅提高來客數與轉換率，帶動營收規模。'});
  }

  if (isEmergency && pct < 85) {
    suggestions.push({tag:'月底限時急救包', style:'pt-coral', reason:`只剩 ${daysLeft} 天且進度落後，建議緊急發放 LINE 熟客高額折扣券。`});
  } else if (daysLeft >= 20 && pct < 30) {
    suggestions.push({tag:'週間常態回流', style:'pt-green', reason:'應及早發布本月「特定平日」優惠，建立長線回流機制。'});
  }
  return suggestions.slice(0, 4);
}

function sw(name){
  const names=['overview','detail','input','settings','promo'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
  document.getElementById('view-'+name).classList.add('show');
  if(name==='detail')renderDSel();
  if(name==='settings')renderTgtInputs();
  if(name==='promo')renderPromo();
}

  // ✨ 自動計算並寫入本月剩餘天數 (只寫入一次，確保可手動修改)
  const now = new Date();
  const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const remainingDays = totalDays - now.getDate();
  const promoInput = document.getElementById('promo-days');
  if(promoInput) {
      promoInput.value = remainingDays;
  }

  document.getElementById('rec-count').textContent=Object.keys(db).length;
  loadFromSheets(); 
};
